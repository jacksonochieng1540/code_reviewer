services:
  - type: web
    name: code-review-assistant
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-assistant-db
          property: connectionString

databases:
  - name: code-review-assistant-db
    plan: free
